<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT5 Trading Bot - Backtesting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        /* Include the same styles as index.html */
        :root {
            --header-height: 3rem;
            --nav-width: 68px;
            --first-color: #4723D9;
            --first-color-light: #AFA5D9;
            --white-color: #F7F6FB;
            --body-font: 'Nunito', sans-serif;
            --normal-font-size: 1rem;
            --z-fixed: 100;
        }
        
        body {
            position: relative;
            margin: var(--header-height) 0 0 0;
            padding: 0 1rem;
            font-family: var(--body-font);
            font-size: var(--normal-font-size);
            transition: .5s;
            background-color: #f8f9fa;
        }

        .header {
            width: 100%;
            height: var(--header-height);
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            background-color: var(--white-color);
            z-index: var(--z-fixed);
            transition: .5s;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .chart-container {
            height: 400px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: linear-gradient(45deg, #4723D9, #6f42c1);
            color: white;
            transition: transform 0.3s;
        }

        .metric-card:hover {
            transform: translateY(-5px);
        }

        .table-container {
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2 class="mb-4">Strategy Backtesting</h2>
        
        <!-- Backtest Configuration -->
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Backtest Configuration</h5>
                <form id="backtest-form" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Symbol</label>
                        <select class="form-select" id="symbol">
                            <option value="EURUSD">EURUSD</option>
                            <option value="GBPUSD">GBPUSD</option>
                            <option value="USDJPY">USDJPY</option>
                            <option value="GBPJPY">GBPJPY</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Timeframe</label>
                        <select class="form-select" id="timeframe">
                            <option value="M1">1 Minute</option>
                            <option value="M5">5 Minutes</option>
                            <option value="M15">15 Minutes</option>
                            <option value="M30">30 Minutes</option>
                            <option value="H1">1 Hour</option>
                            <option value="H4">4 Hours</option>
                            <option value="D1">Daily</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Start Date</label>
                        <input type="text" class="form-control" id="start-date">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">End Date</label>
                        <input type="text" class="form-control" id="end-date">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Initial Balance</label>
                        <input type="number" class="form-control" id="initial-balance" value="10000">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Run Backtest</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Results Section (hidden initially) -->
        <div id="results-section" style="display: none;">
            <!-- Performance Metrics -->
            <div class="row">
                <div class="col-md-3">
                    <div class="card metric-card">
                        <div class="card-body">
                            <h6 class="card-subtitle mb-2">Total Return</h6>
                            <h4 class="card-title" id="total-return">0%</h4>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card metric-card">
                        <div class="card-body">
                            <h6 class="card-subtitle mb-2">Sharpe Ratio</h6>
                            <h4 class="card-title" id="sharpe-ratio">0.00</h4>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card metric-card">
                        <div class="card-body">
                            <h6 class="card-subtitle mb-2">Max Drawdown</h6>
                            <h4 class="card-title" id="max-drawdown">0%</h4>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card metric-card">
                        <div class="card-body">
                            <h6 class="card-subtitle mb-2">Win Rate</h6>
                            <h4 class="card-title" id="win-rate">0%</h4>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Charts -->
            <div class="row">
                <div class="col-12">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Equity Curve</h5>
                            <div id="equity-chart" class="chart-container"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Monthly Returns</h5>
                            <div id="monthly-returns-chart" class="chart-container"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Drawdown</h5>
                            <div id="drawdown-chart" class="chart-container"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Trade List -->
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Trade History</h5>
                    <div class="table-container">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Type</th>
                                    <th>Entry</th>
                                    <th>Exit</th>
                                    <th>Size</th>
                                    <th>P/L</th>
                                </tr>
                            </thead>
                            <tbody id="trade-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize date pickers
        flatpickr("#start-date", {
            enableTime: true,
            dateFormat: "Y-m-d H:i",
            defaultDate: new Date().setMonth(new Date().getMonth() - 1)
        });
        
        flatpickr("#end-date", {
            enableTime: true,
            dateFormat: "Y-m-d H:i",
            defaultDate: new Date()
        });

        // Handle form submission
        document.getElementById('backtest-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                symbol: document.getElementById('symbol').value,
                timeframe: document.getElementById('timeframe').value,
                start_date: document.getElementById('start-date').value,
                end_date: document.getElementById('end-date').value,
                initial_balance: document.getElementById('initial-balance').value
            };

            try {
                const response = await fetch('/run_backtest', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const results = await response.json();
                if (results.success) {
                    displayResults(results.data);
                } else {
                    alert('Backtest failed: ' + results.error);
                }
            } catch (error) {
                console.error('Error running backtest:', error);
                alert('Error running backtest');
            }
        });

        function displayResults(data) {
            // Show results section
            document.getElementById('results-section').style.display = 'block';

            // Update metrics
            document.getElementById('total-return').textContent = 
                (data.metrics.total_return * 100).toFixed(2) + '%';
            document.getElementById('sharpe-ratio').textContent = 
                data.metrics.sharpe_ratio.toFixed(2);
            document.getElementById('max-drawdown').textContent = 
                (data.metrics.max_drawdown * 100).toFixed(2) + '%';
            document.getElementById('win-rate').textContent = 
                (data.metrics.win_rate * 100).toFixed(2) + '%';

            // Plot equity curve
            const equityTrace = {
                x: data.equity_curve.map(d => d.timestamp),
                y: data.equity_curve.map(d => d.equity),
                type: 'scatter',
                mode: 'lines',
                name: 'Equity'
            };

            Plotly.newPlot('equity-chart', [equityTrace], {
                margin: { t: 0, r: 0, l: 40, b: 40 },
                showlegend: false,
                xaxis: { showgrid: false },
                yaxis: { showgrid: true }
            });

            // Plot monthly returns
            const monthlyTrace = {
                x: Object.keys(data.metrics.monthly_returns),
                y: Object.values(data.metrics.monthly_returns).map(v => v * 100),
                type: 'bar',
                name: 'Monthly Returns'
            };

            Plotly.newPlot('monthly-returns-chart', [monthlyTrace], {
                margin: { t: 0, r: 0, l: 40, b: 40 },
                showlegend: false,
                xaxis: { showgrid: false },
                yaxis: { showgrid: true, ticksuffix: '%' }
            });

            // Plot drawdown
            const drawdownTrace = {
                x: data.equity_curve.map(d => d.timestamp),
                y: data.equity_curve.map(d => d.drawdown * 100),
                type: 'scatter',
                mode: 'lines',
                name: 'Drawdown',
                fill: 'tonexty'
            };

            Plotly.newPlot('drawdown-chart', [drawdownTrace], {
                margin: { t: 0, r: 0, l: 40, b: 40 },
                showlegend: false,
                xaxis: { showgrid: false },
                yaxis: { showgrid: true, ticksuffix: '%' }
            });

            // Update trade list
            const tradeList = document.getElementById('trade-list');
            tradeList.innerHTML = '';
            data.trades.forEach(trade => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${new Date(trade.timestamp).toLocaleString()}</td>
                    <td>${trade.type}</td>
                    <td>${trade.entry_price.toFixed(5)}</td>
                    <td>${trade.exit_price.toFixed(5)}</td>
                    <td>${trade.size.toFixed(2)}</td>
                    <td class="${trade.pnl >= 0 ? 'text-success' : 'text-danger'}">
                        ${trade.pnl >= 0 ? '+' : ''}${trade.pnl.toFixed(2)}
                    </td>
                `;
                tradeList.appendChild(row);
            });
        }
    </script>
</body>
</html>
