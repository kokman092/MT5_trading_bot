{% extends "base.html" %}

{% block title %}Payment Cancelled{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-8">
            <div class="card text-center">
                <div class="card-body">
                    <div class="mb-4">
                        <i class="fas fa-times-circle text-danger" style="font-size: 64px;"></i>
                    </div>
                    <h2 class="card-title mb-4">Payment Cancelled</h2>
                    <p class="card-text">Your payment was cancelled and you have not been charged.</p>
                    <div class="mt-4">
                        <a href="{{ url_for('home') }}" class="btn btn-primary me-2">Return to Home</a>
                        <a href="#" class="btn btn-outline-primary" onclick="history.back()">Try Again</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
