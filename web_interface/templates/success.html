{% extends "base.html" %}

{% block title %}Payment Successful{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-8">
            <div class="card text-center">
                <div class="card-body">
                    <div class="mb-4">
                        <i class="fas fa-check-circle text-success" style="font-size: 64px;"></i>
                    </div>
                    <h2 class="card-title mb-4">Payment Successful!</h2>
                    <p class="card-text">Thank you for subscribing to our Trading Bot!</p>
                    <p class="card-text">We've sent you an email with your license key and setup instructions.</p>
                    <div class="mt-4">
                        <a href="{{ url_for('dashboard') }}" class="btn btn-primary me-2">Go to Dashboard</a>
                        <a href="{{ url_for('documentation') }}" class="btn btn-outline-primary">View Documentation</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
